<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Better Sliding Sidebar</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f7f7f8;
      color: #111827;
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      position: relative;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      background: #171717;
      color: white;
      transform: translateX(-100%);
      transition: transform 0.28s ease;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 600;
    }

    .close-btn {
      background: transparent;
      color: #d1d5db;
      border: none;
      font-size: 22px;
      cursor: pointer;
      border-radius: 8px;
      width: 36px;
      height: 36px;
    }

    .close-btn:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .sidebar-content {
      padding: 12px;
      overflow-y: auto;
      flex: 1;
    }

    .menu-section {
      margin-bottom: 18px;
    }

    .menu-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      padding: 10px 12px 8px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      color: #f3f4f6;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
      margin-bottom: 6px;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.08);
      transform: translateX(2px);
    }

    .menu-icon {
      width: 18px;
      text-align: center;
      opacity: 0.9;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.28s ease, visibility 0.28s ease;
      z-index: 900;
    }

    .overlay.show {
      opacity: 1;
      visibility: visible;
    }

    /* Main content */
    .main {
      min-height: 100vh;
      transition: transform 0.28s ease;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .menu-toggle {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .menu-toggle:hover {
      background: #f9fafb;
    }

    .main-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.05);
      max-width: 900px;
    }

    .main-card h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 30px;
    }

    .main-card p {
      margin: 0;
      line-height: 1.6;
      color: #4b5563;
    }

    /* Desktop: push content slightly when sidebar opens */
    @media (min-width: 900px) {
      .main.shift {
        transform: translateX(140px);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Workspace</div>
        <button class="close-btn" id="closeBtn">&times;</button>
      </div>

      <div class="sidebar-content">
        <div class="menu-section">
          <div class="menu-label">General</div>
          <a href="#" class="menu-item">
            <span class="menu-icon">🏠</span>
            <span>Home</span>
          </a>
          <a href="#" class="menu-item">
            <span class="menu-icon">💬</span>
            <span>Chats</span>
          </a>
          <a href="#" class="menu-item">
            < span class="menu-icon">📁</span>
            <span>Projects</span>
          </a>
        </div>

        <div class="menu-section">
          <div class="menu-label">Personal</div>
          <a href="#" class="menu-item">
            <span class="menu-icon">⭐</span>
            <span>Favorites</span>
          </a>
          <a href="#" class="menu-item">
            <span class="menu-icon">⚙️</span>
            <span>Settings</span>
          </a>
          <a href="#" class="menu-item">
            <span class="menu-icon">👤</span>
            <span>Profile</span>
          </a>
        </div>
      </div>
    </aside>

    <div class="overlay" id="overlay"></div>

    <main class="main" id="main">
      <div class="topbar">
        <button class="menu-toggle" id="openBtn">☰</button>
        <strong>My App</strong>
      </div>

      <div class="main-card">
        <h1>Dashboard</h1>
        <p>
          This is your main content area. Click the menu button to open the sidebar.
          The overlay and sliding animation make it feel much more modern.
        </p>
      </div>
    </main>
  </div>

  <script>
    const sidebar = document.getElementById("sidebar");
    const overlay = document.getElementById("overlay");
    const openBtn = document.getElementById("openBtn");
    const closeBtn = document.getElementById("closeBtn");
    const main = document.getElementById("main");

    function openSidebar() {
      sidebar.classList.add("open");
      overlay.classList.add("show");
      main.classList.add("shift");
    }

    function closeSidebar() {
      sidebar.classList.remove("open");
      overlay.classList.remove("show");
      main.classList.remove("shift");
    }

    openBtn.addEventListener("click", openSidebar);
    closeBtn.addEventListener("click", closeSidebar);
    overlay.addEventListener("click", closeSidebar);

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeSidebar();
    });
  </script>
</body>
</html>
