<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatmap Table</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e9e9e9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .figure {
      background: #fff;
      padding: 24px 28px;
      box-sizing: border-box;
    }

    .wrap {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .left {
      display: grid;
      align-items: start;
    }

    .y-labels {
      display: grid;
    }

    .y-label {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      font-size: 14px;
      color: #333;
      white-space: nowrap;
      box-sizing: border-box;
    }

    .heatmap {
      display: grid;
      border: 1px solid #222;
      background: #111;
    }

    .cell {
      box-sizing: border-box;
      border: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #f4f1ea;
      user-select: none;
    }

    .legend-wrap {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }

    .legend {
      width: 20px;
      border: 1px solid #777;
      background: linear-gradient(
        to top,
        rgb(0,0,0) 0%,
        rgb(35,20,10) 20%,
        rgb(80,45,20) 40%,
        rgb(130,75,35) 60%,
        rgb(190,120,60) 80%,
        rgb(240,180,110) 100%
      );
    }

    .legend-labels {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 12px;
      color: #444;
    }

    .corner-note {
      margin-left: 10px;
      font-size: 12px;
      color: #111;
      line-height: 1.1;
      align-self: flex-end;
    }
  </style>
</head>
<body>
  <div class="figure">
    <div class="wrap">
      <div class="left" id="leftBlock">
        <div class="y-labels" id="yLabels"></div>
        <div class="heatmap" id="heatmap"></div>
      </div>

      <div class="legend-wrap">
        <div class="legend" id="legendBar"></div>
        <div class="legend-labels" id="legendLabels"></div>
      </div>
    </div>
  </div>

  <script>
    fetch("matrix_D.json")
      .then(res => res.json())
      .then(dataset => {
        const labels = dataset.labels;
        const matrix = dataset.data;

        const heatmapEl = document.getElementById("heatmap");
        const yLabelsEl = document.getElementById("yLabels");
        const legendLabelsEl = document.getElementById("legendLabels");
        const leftBlock = document.getElementById("leftBlock");
        const legendBar = document.getElementById("legendBar");

        const rows = matrix.length;
        const cols = matrix[0].length;

        const cellWidth = 44;
        const cellHeight = 32;
        const labelWidth = 140;

        const maxValue = Math.max(...matrix.flat());

        leftBlock.style.gridTemplateColumns = `${labelWidth}px auto`;
        yLabelsEl.style.gridTemplateRows = `repeat(${rows}, ${cellHeight}px)`;
        heatmapEl.style.gridTemplateColumns = `repeat(${cols}, ${cellWidth}px)`;
        heatmapEl.style.gridTemplateRows = `repeat(${rows}, ${cellHeight}px)`;

        const fullHeight = rows * cellHeight;
        legendBar.style.height = `${fullHeight}px`;
        legendLabelsEl.style.height = `${fullHeight}px`;

        function lerp(a, b, t) {
          return a + (b - a) * t;
        }

        function getColor(value) {
          const t = Math.max(0, Math.min(1, value / maxValue));

          let r, g, b;

          if (t < 0.5) {
            const k = t / 0.5;
            r = Math.round(lerp(0, 110, k));
            g = Math.round(lerp(0, 60, k));
            b = Math.round(lerp(0, 25, k));
          } else {
            const k = (t - 0.5) / 0.5;
            r = Math.round(lerp(110, 240, k));
            g = Math.round(lerp(60, 180, k));
            b = Math.round(lerp(25, 110, k));
          }

          return `rgb(${r}, ${g}, ${b})`;
        }

        function getTextColor(value) {
          return value > maxValue * 0.55 ? "#fffaf2" : "#f5f0e8";
        }

        labels.forEach(label => {
          const div = document.createElement("div");
          div.className = "y-label";
          div.textContent = label;
          yLabelsEl.appendChild(div);
        });

        matrix.forEach(row => {
          row.forEach(value => {
            const cell = document.createElement("div");
            cell.className = "cell";
            cell.style.width = `${cellWidth}px`;
            cell.style.height = `${cellHeight}px`;
            cell.style.backgroundColor = getColor(value);
            cell.style.color = getTextColor(value);
            cell.textContent = value === 0 ? "0" : value.toFixed(4);
            heatmapEl.appendChild(cell);
          });
        });

        const tickCount = 11;
        for (let i = 0; i < tickCount; i++) {
          const v = maxValue * (1 - i / (tickCount - 1));
          const d = document.createElement("div");
          d.textContent = Number(v.toFixed(3)).toString();
          legendLabelsEl.appendChild(d);
        }
      })
      .catch(err => {
        console.error("Failed to load matrix_D.json:", err);
      });
  </script>
</body>
</html>
